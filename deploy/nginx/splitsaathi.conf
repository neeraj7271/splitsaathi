# Install on the VM:
#   sudo cp deploy/nginx/splitsaathi.conf /etc/nginx/sites-available/splitsaathi
#   sudo ln -sf /etc/nginx/sites-available/splitsaathi /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS:
#   A  api.thesplitsaathi.com  -> VM IP
#   A  thesplitsaathi.com      -> VM IP (landing later)
#   A  www.thesplitsaathi.com  -> VM IP (landing later)
#
# TLS (after DNS resolves):
#   sudo certbot --nginx -d api.thesplitsaathi.com

# --- API + invite links: api.thesplitsaathi.com ---
server {
    listen 80;
    listen [::]:80;
    server_name api.thesplitsaathi.com;

    client_max_body_size 25M;

    location /docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs-json {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# --- Apex / www: landing page later (placeholder keeps IP/domain from 502) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name thesplitsaathi.com www.thesplitsaathi.com _;

    location / {
        return 302 https://api.thesplitsaathi.com/docs;
    }
}
