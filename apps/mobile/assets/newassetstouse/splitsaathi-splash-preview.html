<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SplitSaathi — Animated Splash Preview</title>
<style>
  :root {
    --teal: #1AA88A;
    --purple: #5B4FCF;
    --stage-bg: #0a0a0d;
    --stage-radial: #14151b;
    --badge-bg: #ffffff;
    --badge-border: transparent;
    --badge-shadow: 0 10px 40px rgba(0,0,0,0.35);
    --text: #cfcfe0;
    --panel: rgba(255,255,255,0.08);
    --panel-border: rgba(255,255,255,0.15);
  }
  html[data-theme="light"] {
    --stage-bg: #F6F7FB;
    --stage-radial: #ffffff;
    --badge-bg: #ffffff;
    --badge-border: #E4E7EF;
    --badge-shadow: 0 10px 28px rgba(23,25,34,0.12);
    --text: #5B6273;
    --panel: rgba(23,25,34,0.06);
    --panel-border: rgba(23,25,34,0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--stage-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 42%, var(--stage-radial) 0%, var(--stage-bg) 70%);
  }
  .splash-wrap {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    width: 320px;
  }
  .glow {
    position: absolute;
    top: 0; left: 50%;
    width: 260px; height: 260px;
    margin-left: -130px; margin-top: -35px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--teal), var(--purple), var(--teal));
    filter: blur(38px);
    opacity: 0;
    transform: scale(0.6);
    animation:
      glowIn 0.9s cubic-bezier(.2,.8,.2,1) 0.15s forwards,
      glowPulse 2.6s ease-in-out 1.05s infinite;
  }
  .icon-mask {
    position: relative;
    width: 190px; height: 190px;
    border-radius: 50%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--badge-bg);
    border: 1px solid var(--badge-border);
    box-shadow: var(--badge-shadow);
    clip-path: circle(0% at 50% 50%);
    animation: reveal 0.7s cubic-bezier(.16,1,.3,1) 0.1s forwards;
  }
  .icon-mask img {
    width: 82%;
    height: 82%;
    object-fit: contain;
    /* Optical center — asset is already geometrically centered */
    transform: scale(0.72) rotate(-14deg);
    opacity: 0;
    animation: iconIn 0.75s cubic-bezier(.16,1,.3,1) 0.18s forwards,
               iconBreathe 2.6s ease-in-out 1.1s infinite;
  }
  .wordmark {
    margin-top: 26px;
    width: 230px;
    opacity: 0;
    transform: translateY(16px);
    animation: wordIn 0.65s cubic-bezier(.16,1,.3,1) 0.62s forwards;
  }
  .wordmark img { width: 100%; display: block; }
  .dots {
    margin-top: 22px;
    display: flex; gap: 8px;
    opacity: 0;
    animation: dotsIn 0.4s ease 1.05s forwards;
  }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--purple));
    animation: dotPulse 1.1s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes reveal {
    to { clip-path: circle(75% at 50% 50%); }
  }
  @keyframes iconIn {
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes iconBreathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.045) rotate(0.5deg); }
  }
  @keyframes glowIn {
    to { opacity: 0.55; transform: scale(1); }
  }
  html[data-theme="light"] .glow {
    animation:
      glowInLight 0.9s cubic-bezier(.2,.8,.2,1) 0.15s forwards,
      glowPulseLight 2.6s ease-in-out 1.05s infinite;
  }
  @keyframes glowInLight {
    to { opacity: 0.32; transform: scale(1); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.45; transform: scale(1) rotate(0deg); }
    50% { opacity: 0.7; transform: scale(1.12) rotate(8deg); }
  }
  @keyframes glowPulseLight {
    0%, 100% { opacity: 0.24; transform: scale(1) rotate(0deg); }
    50% { opacity: 0.4; transform: scale(1.12) rotate(8deg); }
  }
  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes dotsIn { to { opacity: 1; } }
  @keyframes dotPulse {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  .controls {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .controls button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--panel-border);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(6px);
  }
  .controls button:hover { filter: brightness(1.08); }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="splash-wrap" id="splash">
      <div class="glow"></div>
      <div class="icon-mask">
        <img src="./icon.png" alt="SplitSaathi icon" />
      </div>
      <div class="wordmark">
        <img src="./wordmark-transparent.png" alt="SplitSaathi" />
      </div>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <div class="controls">
    <button type="button" id="themeBtn">Toggle light / dark</button>
    <button type="button" id="replayBtn">Replay</button>
  </div>
  <script>
    const root = document.documentElement;
    const splash = document.getElementById('splash');
    document.getElementById('themeBtn').addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      if (next === 'dark') root.removeAttribute('data-theme');
      else root.setAttribute('data-theme', 'light');
    });
    document.getElementById('replayBtn').addEventListener('click', () => {
      const clone = splash.cloneNode(true);
      splash.replaceWith(clone);
      clone.id = 'splash';
    });
  </script>
</body>
</html>
