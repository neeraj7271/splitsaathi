# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
android.useAndroidX=true

# AAPT2 PNG crunching
android.enablePngCrunchInReleaseBuilds=true

# Release ABIs only (drop x86/x86_64 emulator slices from APK — major size win).
# For Play Store prefer `bundleRelease` (AAB) which serves per-ABI ~20–35MB.
reactNativeArchitectures=armeabi-v7a,arm64-v8a

# R8 minify + resource shrink for release builds
android.enableMinifyInReleaseBuilds=true
android.enableShrinkResourcesInReleaseBuilds=true
android.enableBundleCompression=true

newArchEnabled=true
hermesEnabled=true
edgeToEdgeEnabled=true

expo.gif.enabled=true
expo.webp.enabled=true
# Animated webp adds ~3.4MB — keep off
expo.webp.animated=false

EX_DEV_CLIENT_NETWORK_INSPECTOR=true

# Compress native libs in APK
expo.useLegacyPackaging=true
expo.edgeToEdgeEnabled=true
